server {
    listen 80;  # 监听80端口
    server_name 1.92.100.245;  # 设置服务器的 IP 地址

    location / {
        root /usr/share/nginx/html;  # 静态文件路径
        index index.html index.htm;  # 默认文件
        try_files $uri $uri/ /index.html;  # 支持HTML5历史记录模式
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
